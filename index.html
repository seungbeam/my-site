<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden; /* 스크롤 제거 */
    background: #fff; /* 여백 흰색 */
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    display: block;
}
</style>
</head>
<body>
    <img src="image.jpg" draggable="false">
</body>
</html>
